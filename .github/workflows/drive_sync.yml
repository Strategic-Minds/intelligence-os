name: Drive Sync Trigger

on:
  repository_dispatch:
    types: [drive_sync_completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync_drive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run GPT Bridge
        run: npm run gpt-bridge-sync
